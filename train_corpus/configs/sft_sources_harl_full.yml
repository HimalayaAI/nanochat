sources:
  # Full SFT pool for HimalayaAI chat tuning.
  # This mix intentionally keeps full datasets (no row caps) so we can re-sample later.

  # 1) Core Nepali SFT data
  - id: himalaya-ai/nepali-sft-dataset
    adapter: sharegpt_conversations
    conversation_field: conversations
    split: train
    streaming: true
    shuffle_buffer: 50000

  # 2) Devanagari compile from our previous stage.
  # Use only the ShareGPT file to avoid mixed-schema JSONL parsing issues.
  - id: himalaya-ai/deva-sft-compile-v1
    adapter: sharegpt_conversations
    conversation_field: conversations
    split: train
    streaming: true
    shuffle_buffer: 50000
    data_files: data/sharegpt_deva_mixture.jsonl

  # 3) Reasoning + tool-use conversations
  - id: interstellarninja/hermes_reasoning_tool_use
    adapter: sharegpt_conversations
    conversation_field: conversations
    split: train
    streaming: true
    shuffle_buffer: 50000

  # 4) Strong coding and instruction-following additions
  - id: allenai/tulu-3-sft-personas-code
    adapter: sharegpt_messages
    message_field: messages
    split: train
    streaming: true
    shuffle_buffer: 50000

  - id: allenai/tulu-3-sft-mixture
    adapter: sharegpt_messages
    message_field: messages
    split: train
    streaming: true
    shuffle_buffer: 50000
